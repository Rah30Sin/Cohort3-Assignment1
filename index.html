<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pikachu Landing Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="main">

    <div class="container">

      <div class="left">

        <img 
          class="logo"
           src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" 
          alt=""
        >

        <p class="sub">POKEMON GEN I</p>

        <h1>Pikachu</h1>

        <p class="desc">
          Pikachu is an Electric-type Pokémon introduced
          in Generation I. Pikachu are small, chubby,
          and incredibly cute mouse-like Pokémon.
          They are almost completely covered by
          yellow fur.
        </p>

        <div class="count">
          <div class="line"></div>
          <span>01 / 08</span>
        </div>

        <div class="pokeball"></div>

      </div>

      <div class="right">

        <div class="menu">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <img
          class="pikachu"
          src="pikachu.png"
          alt=""
        >

        <div class="dots">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
